<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz AP07 - Les dictionnaires</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        code {
            background-color: #eef2ff;
            color: #4338ca;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            border: 1px solid #c7d2fe;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
    <div class="max-w-3xl mx-auto bg-white shadow-xl rounded-xl p-8 border border-indigo-100">
        <h1 class="text-3xl font-extrabold text-indigo-700 mb-2 text-center">Séance AP07 : Les dictionnaires</h1>
        
        <div id="quiz-container" class="space-y-8"></div>

        <div id="result-area" class="hidden mt-10 p-6 border-t-2 border-indigo-100 text-center">
            <h2 id="final-score" class="text-2xl font-bold text-indigo-800"></h2>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Recommencer le quiz</button>
        </div>
    </div>

    <script>
        let score = 0;
        let answeredQuestions = 0;
        let totalQuestions = 0;

        async function initQuiz() {
            try {
                const response = await fetch('AP07_quiz-data.json');
                const questions = await response.json();
                totalQuestions = questions.length;
                const container = document.getElementById('quiz-container');

                questions.forEach((q, qIdx) => {
                    const qDiv = document.createElement('div');
                    qDiv.className = "p-6 rounded-lg border border-slate-200 bg-white transition-all";
                    qDiv.innerHTML = `
                        <p class="font-bold text-lg text-slate-800 mb-4">${qIdx + 1}. ${q.question}</p>
                        <div class="grid grid-cols-1 gap-3" id="options-${qIdx}">
                            ${q.options.map((opt, i) => `
                                <button onclick="checkAnswer(${qIdx}, ${i}, ${q.answer})" 
                                        class="text-left p-3 border rounded-lg hover:bg-indigo-50 hover:border-indigo-300 transition-colors">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                        <div id="feedback-${qIdx}" class="hidden mt-4 p-4 rounded-lg border text-sm italic">
                            <p class="font-semibold mb-1"></p>
                            <span>${q.feedback}</span>
                        </div>
                    `;
                    container.appendChild(qDiv);
                });
            } catch (e) {
                console.error("Erreur lors du chargement du JSON :", e);
            }
        }

        function checkAnswer(qIdx, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll(`#options-${qIdx} button`);
            const feedback = document.getElementById(`feedback-${qIdx}`);
            
            if (selectedIdx === correctIdx) score++;
            answeredQuestions++;

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === correctIdx) {
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                } else if (i === selectedIdx) {
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                }
            });

            feedback.classList.remove('hidden');
            const isCorrect = selectedIdx === correctIdx;
            feedback.classList.add(isCorrect ? 'bg-green-50' : 'bg-red-50');
            feedback.classList.add(isCorrect ? 'border-green-500' : 'border-red-500');
            feedback.querySelector('p').innerText = isCorrect ? "✅ Correct !" : "❌ Incorrect";

            if (answeredQuestions === totalQuestions) {
                const resultArea = document.getElementById('result-area');
                document.getElementById('final-score').innerText = `Votre score : ${score} / ${totalQuestions}`;
                resultArea.classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        initQuiz();
    </script>
</body>
</html>
