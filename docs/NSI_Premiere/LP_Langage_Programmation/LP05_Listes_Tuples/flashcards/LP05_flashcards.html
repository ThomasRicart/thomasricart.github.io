<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flashcards LP05 - Listes et Tuples</title>
    <style>
        :root {
            --accent-color: #3b82f6; /* Bleu pour LP05 */
        }
        #chapter-title { 
            color: #1e3a8a; 
            font-family: sans-serif;
            text-align: center;
        }
        .front { border-top: 5px solid #3b82f6; }
        /* Les autres styles sont importés via flashcards_style.css dans votre structure */
    </style>
    <script>
	  window.MathJax = {
		tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
	  };
	</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <script src="../../../../_environments/stylesheets/flashcards_core.js" defer></script>
</head>
<body>

    <h1 id="chapter-title">Chapitre LP05 : Les Listes et les Tuples</h1>
    <div id="progress">Chargement des questions...</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="front" id="recto"></div>
            <div class="back" id="verso"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">Précédent</button>
        <button onclick="nextCard(event)">Suivant</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initFlashcards === 'function') {
                // On pointe vers le nouveau fichier JSON
                initFlashcards('LP05_questions.json');
            }
        });
    </script>
</body>
</html>
