<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flashcards LP06 - Algorithmes de Recherche</title>
    <link rel="stylesheet" href="../../../../_environments/stylesheets/flashcards_style.css">
    <style>
        :root {
            --accent-color: #4f46e5; /* Indigo pour changer du bleu LP05 */
        }
        #chapter-title { color: #1e1b4b; }
        .front { border-top: 5px solid var(--accent-color); }
        strong { color: var(--accent-color); }
    </style>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <script src="../../../../_environments/stylesheets/flashcards_core.js" defer></script>
</head>
<body>

    <h1 id="chapter-title">Séance LP06 : Algorithmes de Recherche</h1>
    <div id="progress">Chargement des notions...</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="front" id="recto"></div>
            <div class="back" id="verso"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">Précédent</button>
        <button onclick="nextCard(event)">Suivant</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initFlashcards === 'function') {
                // Chargement du fichier JSON spécifique au LP06
                initFlashcards('LP06_questions.json');
            }
        });
    </script>
</body>
</html>
