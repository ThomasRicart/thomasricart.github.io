<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flashcards LP02 - Les Fonctions</title>
    <link rel="stylesheet" href="../../../../_environments/stylesheets/flashcards_style.css">
    <style>
        /* Surcharge pour le thème orange LP02 */
        :root {
            --accent-color: #f59e0b; 
        }
        #chapter-title { color: #d97706; }
        .front { border-top: 5px solid #f59e0b; }
    </style>
    <script>
	  window.MathJax = {
		tex: {
		  inlineMath: [['$', '$'], ['\\(', '\\)']]
		}
	  };
	</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <script src="../../../../_environments/stylesheets/flashcards_core.js" defer></script>
</head>
<body>

    <h1 id="chapter-title">Chapitre LP02 : Les Fonctions</h1>
    <div id="progress">Chargement des questions...</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="front" id="recto"></div>
            <div class="back" id="verso"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">Précédent</button>
        <button onclick="nextCard(event)">Suivant</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // On appelle la fonction du core.js avec le nouveau fichier JSON
            if (typeof initFlashcards === 'function') {
                initFlashcards('LP02_questions.json');
            } else {
                console.error("Le fichier flashcards_core.js n'est pas accessible.");
                document.getElementById('progress').innerText = "Erreur : core.js introuvable";
            }
        });
    </script>
</body>
</html>
